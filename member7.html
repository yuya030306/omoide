<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中村 大輝 - プロフィール</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg) var(--spacing-md);
        }

        .profile-card {
            max-width: 800px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--glass-shadow);
        }

        .profile-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 193, 7, 0.2));
        }

        .profile-content {
            padding: var(--spacing-lg);
        }

        .profile-name {
            font-family: var(--font-heading);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-md);
        }

        .profile-bio {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            color: #000;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-heading);
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <div class="profile-card">
            <img src="images/member7.jpg" alt="中村 大輝" class="profile-image">
            <div class="profile-content">
                <h1 class="profile-name">中村 大輝</h1>
                <p class="profile-bio">
                    クールな大輝。でも本当は優しいって知ってるよ！<br><br>

                    普段は寡黙で、あまり感情を表に出さない大輝。
                    でも、困っている人がいたら黙って手を差し伸べる、
                    そんな優しさを持っていました。<br><br>

                    野球部のエースとして、チームを支え続けた君。
                    最後の試合で見せた涙は、みんなの心に深く刻まれています。
                    不器用だけど、誰よりも熱い心を持っている君。
                    これからも自分らしく、頑張ってください！
                </p>
                <a href="index.html" class="back-button">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span>トップページに戻る</span>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
